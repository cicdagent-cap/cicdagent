  CICD_DEFAULT_SCHEME: CI_CD_Project
  CICD_DEFAULT_CONFIGURATION: Debug
  CICD_TEST_DESTINATION: platform=iOS Simulator,name=iPhone 15

fastlane:
  FASTLANE_TEAM_ID: ""
  FASTLANE_ITC_TEAM_ID: ""
  FASTLANE_BUNDLE_IDENTIFIER: com.example.app

match:
  MATCH_GIT_URL: git@github.com:your-org/certificates.git

notification:
  provider: teams
  webhook_env: TEAM_WEBHOOK_URL
