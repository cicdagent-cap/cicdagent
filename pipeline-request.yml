# Fill this file when asking the CICD agent to create a new pipeline.
# The agent uses `.github/pipeline-templates/ios-fastlane-workflow.template.yml`.

pipeline:
  name: Demo_Pipeline
  description: Pipeline generated by the CICD agent
  output_file: ThirdParty/demo-pipeline.yml

github_actions:
  reusable_workflow_ref: gma-org/gmad-gha-workflows/.github/workflows/ios.yaml@v1.3.0
  runner_label: mac-m4-xc26.2-eu
  default_branch: main

ios:
  market: CICD_APP
  release_notes_input: false
  presets:
    default: Debug-CICD
    options:
      - Debug-CICD
      - Release-CICD
  config_override:
    input_name: config_Override
    path: .github/config-overrides/config_overrides.json
    default: None
    options:
      - None
      - 'a: Feature A Enabled'
      - 'b: Feature A Enabled + Feature B Enabled'

notifications:
  provider: none
  webhook_secret_name: TEAM_WEBHOOK_URL
